version: "3.9"

services:
  ipcf:
    build: .
    container_name: ipcf_fabric
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./benchmark/datasets:/app/benchmark/datasets
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
